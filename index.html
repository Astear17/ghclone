        const categories = ["Tất Cả", "TRUYỀN HÌNH", "PHIM", "VPN", "TIỆN ÍCH"];
        let activeCategory = "Tất Cả";

        function renderCategories() {
            const container = document.getElementById("category-bar");
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" class="category-btn ${activeCategory === cat ? 'active' : ''}">
                    ${cat}
                </button>
            `).join("");
        }

        function setCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderApps();
        }

        function renderApps() {
            const list = document.getElementById("app-list");
            const filtered = activeCategory === "Tất Cả" 
                ? appData 
                : appData.filter(app => app.category === activeCategory);

            list.innerHTML = filtered.map(app => `
                <div onclick="window.location.href='${app.link}'" class="glass-card p-3 rounded-xl flex flex-col h-full">
                    <div class="flex items-start gap-3 mb-2">
                        <img src="${app.icon}" class="w-12 h-12 rounded-lg object-cover flex-shrink-0" alt="${app.name}">
                        <div class="min-w-0 flex-grow">
                            <h3 class="font-bold text-[0.8rem] dark:text-white truncate leading-tight">${app.name}</h3>
                            <p class="text-[0.6rem] text-emerald-500 font-bold uppercase mt-1">${app.category}</p>
                        </div>
                    </div>
                    <p class="text-[0.65rem] text-gray-500 dark:text-gray-400 line-clamp-2 mt-auto">${app.desc}</p>
                </div>
            `).join("");
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById("theme-icon");
            if (html.classList.contains("dark")) {
                html.classList.remove("dark");
                icon.setAttribute("data-lucide", "moon");
            } else {
                html.classList.add("dark");
                icon.setAttribute("data-lucide", "sun");
            }
            lucide.createIcons();
        }

        renderCategories();
        renderApps();
        lucide.createIcons();
    </script>
